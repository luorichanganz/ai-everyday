name: Weekly AI Briefing

on:
  schedule:
    # 每周二 13:20（北京时间）
    - cron: '0 4 * * 3'
  workflow_dispatch:
    inputs:
      send_email:
        description: '是否真实发送邮件（true/false）。默认 false = dry-run（只生成预览）'
        required: false
        default: 'false'
      checkpoint_run_id:
        description: '可选：从指定失败 run_id 下载 ai-weekly-checkpoint artifact 恢复 checkpoint'
        required: false
        default: ''

permissions:
  contents: read
  actions: read

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # 把 secrets 暴露到步骤中以便写 .env
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
      LOG_RECEIVER_EMAIL: ${{ secrets.LOG_RECEIVER_EMAIL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # <-- 新增：LLM 配置（可从 secrets 覆盖，若不设置则使用默认值）
      LLM_API_URL: ${{ vars.LLM_API_URL }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      SEND_EMAIL_INPUT: ${{ github.event.inputs.send_email || 'false' }}
      CHECKPOINT_RUN_ID: ${{ github.event.inputs.checkpoint_run_id || '' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore artifacts from previous run
        if: ${{ env.CHECKPOINT_RUN_ID != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Restoring from run_id=$CHECKPOINT_RUN_ID"

          # 1. Try checkpoint artifact (for LLM step recovery)
          mkdir -p .checkpoints restored-checkpoint
          if gh run download "$CHECKPOINT_RUN_ID" --name ai-weekly-checkpoint --dir restored-checkpoint 2>/dev/null; then
            echo "Restoring checkpoint from ai-weekly-checkpoint artifact"
            if [ -d "restored-checkpoint/.checkpoints" ]; then
              cp -a restored-checkpoint/.checkpoints/. .checkpoints/
            elif [ -f "restored-checkpoint/ai_weekly_briefing.json" ]; then
              cp restored-checkpoint/ai_weekly_briefing.json .checkpoints/
            else
              echo "Warning: checkpoint artifact found but no valid checkpoint data"
              find restored-checkpoint -maxdepth 3 -type f -print || true
            fi
            echo "--- restored checkpoint files ---"
            find .checkpoints -maxdepth 2 -type f -print || true
          else
            echo "No ai-weekly-checkpoint artifact (run may have been successful)"
          fi

          # 2. Try email artifact (for pre-generated HTML from dry-run)
          EMAIL_DIR="已生成的邮件"
          mkdir -p "$EMAIL_DIR" restored-email
          if gh run download "$CHECKPOINT_RUN_ID" --name ai-weekly-email --dir restored-email 2>/dev/null; then
            echo "Restoring emails from ai-weekly-email artifact"
            if [ -d "restored-email/$EMAIL_DIR" ]; then
              cp -a "restored-email/$EMAIL_DIR/." "$EMAIL_DIR/"
            fi
            find "$EMAIL_DIR" -type f -name '*.html' -exec echo "Restored: {}" \;
            if [ -f "restored-email/email_preview.html" ]; then
              cp restored-email/email_preview.html .
              echo "Restored email_preview.html"
            fi
          else
            echo "No ai-weekly-email artifact (no pre-generated emails available)"
          fi
        shell: bash

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create .env from repository secrets
        run: |
          # 将需要的环境变量写入 .env，脚本会读取它
          cat > .env <<EOF
          SENDER_EMAIL=${SENDER_EMAIL}
          SENDER_PASSWORD=${SENDER_PASSWORD}
          RECEIVER_EMAILS=${RECEIVER_EMAILS}
          LOG_RECEIVER_EMAIL=${LOG_RECEIVER_EMAIL}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          # <-- 新增：写入 LLM 配置，如果环境变量未定义则使用默认值
          LLM_API_URL=${LLM_API_URL:-https://openrouter.ai/api/v1/chat/completions}
          LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-v4-pro}
          EOF
        shell: bash

      - name: Count generated emails before run
        id: generated_before
        run: |
          mkdir -p "已生成的邮件"
          count=$(find "已生成的邮件" -type f -name '*.html' | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "运行前已生成邮件数量: $count"
        shell: bash

      - name: Send pre-generated emails (if send_email=true and HTML files exist)
        id: send_preexisting
        if: ${{ env.SEND_EMAIL_INPUT == 'true' }}
        run: |
          set -euo pipefail
          EMAIL_DIR="已生成的邮件"
          files=()
          while IFS= read -r -d '' f; do
            files+=("$f")
          done < <(find "$EMAIL_DIR" -maxdepth 1 -type f -name '*.html' -print0 2>/dev/null)
          count=${#files[@]}
          if [ "$count" -gt 0 ]; then
            echo "Found $count pre-existing email(s), sending them directly..."
            for file in "${files[@]}"; do
              basename=$(basename "$file")
              echo "Sending: $basename"
              python send_generated_email.py "$basename"
            done
            echo "All $count pre-existing email(s) sent successfully"
            echo "sent=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pre-existing emails found, will run normal generation"
            echo "sent=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Run ai_weekly_briefing (dry-run by default)
        if: ${{ steps.send_preexisting.outputs.sent != 'true' }}
        run: |
          set -euo pipefail
          echo "SEND_EMAIL_INPUT=$SEND_EMAIL_INPUT"
          if [ "$SEND_EMAIL_INPUT" = "true" ]; then
            echo "Running real send..."
            python ai_weekly_briefing.py
          else
            echo "Running dry-run (生成预览，不发送邮件)..."
            python ai_weekly_briefing.py --dry-run
          fi
        shell: bash

      - name: Check generated emails after run
        id: generated_after
        if: ${{ always() }}
        env:
          BEFORE_COUNT: ${{ steps.generated_before.outputs.count }}
        run: |
          mkdir -p "已生成的邮件"
          before_count="${BEFORE_COUNT:-0}"
          after_count=$(find "已生成的邮件" -type f -name '*.html' | wc -l | tr -d ' ')
          new_count=$((after_count - before_count))
          if [ "$new_count" -lt 0 ]; then
            new_count=0
          fi
          echo "after_count=$after_count" >> "$GITHUB_OUTPUT"
          echo "new_count=$new_count" >> "$GITHUB_OUTPUT"
          if [ "$new_count" -eq 0 ]; then
            echo "no_generated=true" >> "$GITHUB_OUTPUT"
            echo "本次运行没有新增 HTML 邮件"
          else
            echo "no_generated=false" >> "$GITHUB_OUTPUT"
            echo "本次运行新增 HTML 邮件数量: $new_count"
          fi
        shell: bash

      - name: List generated files
        if: ${{ always() }}
        run: |
          echo "工作目录文件："
          ls -la
          echo "查看 checkpoint 目录（如存在）："
          ls -la ".checkpoints" || true
          echo "查看已生成的邮件目录（如存在）："
          ls -la "已生成的邮件" || true

      - name: Upload generated HTML as artifact
        if: ${{ !cancelled() && (steps.generated_after.outputs.no_generated != 'true' || steps.send_preexisting.outputs.sent == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-weekly-email
          path: |
            email_preview.html
            已生成的邮件/**/*.html
          if-no-files-found: warn

      - name: Upload checkpoint and logs for future runs
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-weekly-checkpoint
          path: |
            .checkpoints/**
            ai_weekly_briefing.log
            ai_weekly_briefing.log
            dify_automation_run_log.log
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14

      - name: Fail when no generated email
        if: ${{ always() && steps.generated_after.outputs.no_generated == 'true' && steps.send_preexisting.outputs.sent != 'true' }}
        run: |
          echo "本次 workflow 没有生成新的 HTML 邮件，标记为失败。checkpoint/log 已上传到 ai-weekly-checkpoint artifact。"
          exit 1
        shell: bash