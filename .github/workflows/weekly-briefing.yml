name: Weekly AI Briefing

on:
  schedule:
    # 每周二 09:35（北京时间）
    - cron: '35 1 * * 2'
  workflow_dispatch:
    inputs:
      send_email:
        description: '是否真实发送邮件（true/false）。默认 false = dry-run（只生成预览）'
        required: false
        default: 'false'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      # 把 secrets 暴露到步骤中以便写 .env
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
      LOG_RECEIVER_EMAIL: ${{ secrets.LOG_RECEIVER_EMAIL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SEND_EMAIL_INPUT: ${{ github.event.inputs.send_email || 'false' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create .env from repository secrets
        run: |
          # 将需要的环境变量写入 .env，脚本会读取它
          cat > .env <<EOF
          SENDER_EMAIL=${SENDER_EMAIL}
          SENDER_PASSWORD=${SENDER_PASSWORD}
          RECEIVER_EMAILS=${RECEIVER_EMAILS}
          LOG_RECEIVER_EMAIL=${LOG_RECEIVER_EMAIL}
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          EOF
        shell: bash

      - name: Run ai_daily_briefing (dry-run by default)
        run: |
          echo "SEND_EMAIL_INPUT=$SEND_EMAIL_INPUT"
          if [ "$SEND_EMAIL_INPUT" = "true" ]; then
            echo "Running real send..."
            python ai_daily_briefing.py
          else
            echo "Running dry-run (生成预览，不发送邮件)..."
            python ai_daily_briefing.py --dry-run
          fi
        shell: bash

      - name: List generated files
        run: |
          echo "工作目录文件："
          ls -la
          echo "查看已生成的邮件目录（如存在）："
          ls -la "已生成的邮件" || true

      - name: Upload generated HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-weekly-email
          path: |
            email_preview.html
            已生成的邮件/**/*.html