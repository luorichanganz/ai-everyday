    - data:
        code: "import re\nfrom datetime import datetime,timedelta\n\ndef main(arg1):\n\
          \    # 获取原始 HTML 内容\n    # 支持字符串直接传入，也支持字典包含 body 字段\n    if isinstance(arg1,\
          \ dict):\n        raw_html = arg1.get(\"body\", \"\")\n    else:\n     \
          \   raw_html = arg1\n    \n    # 1. 动态获取今天的日期 (格式: 2026-05-17)\n    yesterday_str\
          \ = (datetime.now() - timedelta(days=0)).strftime(\"%Y-%m-%d\")\n    \n\
          # 2. 定位今天内容的起始和结束位置 (正则一步到位)\n    # 意思是：匹配今天日期的 title 标签，然后精准抓取后面的内容 (.*?)\n\
          \    # 直到遇到下一个任意日期的 title 标签，或者直接匹配到网页末尾 ($) 为止\n    pattern = rf\"<title>{yesterday_str}</title>(.*?)(?=<title>\\\
          d{{4}}-\\d{{2}}-\\d{{2}}</title>|$)\"\n    \n    # flags=re.DOTALL 让 . 能够匹配换行符\n\
          \    match = re.search(pattern, raw_html, flags=re.DOTALL)\n    \n    if\
          \ not match:\n        return {\"result\": f\"未找到昨天 ({yesterday_str}) 的更新内容。\"\
          }\n    \n    # 直接提取出中间捕获组的内容，已经剔除了日期标签本身\n    day_content = match.group(1)\n\
          \n    # 3. 清洗内容 (纯正则处理)\n    # 移除脚本和样式\n    day_content = re.sub(r'<(script|style).*?>.*?</\\\
          1>', '', day_content, flags=re.DOTALL | re.IGNORECASE)\n    # 移除所有图片标签\n\
          \    day_content = re.sub(r'<img.*?>', '', day_content, flags=re.IGNORECASE)\n\
          \    # 将 </h2> </h3> </li> 等换行标签替换为真正的换行符，便于 AI 阅读\n    day_content = re.sub(r'</(h1|h2|h3|h4|p|li|div)>',\
          \ '\\n', day_content, flags=re.IGNORECASE)\n    # 移除所有剩余的 HTML 标签\n    day_content\
          \ = re.sub(r'<.*?>', '', day_content)\n    \n    # 4. 符号与格式深度清理\n    # 移除\
          \ ↗ 箭头\n    day_content = day_content.replace('↗', '')\n    # 移除 #1, #2\
          \ 这种编号\n    day_content = re.sub(r'#\\d+', '', day_content)\n    # 移除常见的\
          \ HTML 转义符\n    day_content = day_content.replace('&nbsp;', ' ').replace('&gt;',\
          \ '>').replace('&lt;', '<')\n    # 清理多余的空白行\n    lines = [line.strip() for\
          \ line in day_content.split('\\n') if line.strip()]\n    final_text = '\\\
          n'.join(lines)\n\n    return {\n        \"result\": final_text,\n      \
          \  \"date\": yesterday_str\n    }"
