<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#ECF3FA;font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei','PingFang SC',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#ECF3FA;padding:20px 0;">
<tr><td align="center">
<!-- 主表格宽度改为 760px -->
<table width="760" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08);">

  <!-- 头部 -->
<tr><td style="background-color:#0055A4; padding:32px 50px;">
  <h1 style="margin:0;font-size:38px;color:#FFFFFF;letter-spacing:1px;"> AI 与半导体周报</h1>
  <!-- 日期颜色改为冰蓝色 #A7D0FF -->
  <p style="margin:12px 0 0 0;font-size:13px;color:#D4E6FF;">
    &nbsp;&nbsp;|&nbsp;&nbsp;发送日期：{{formatted_date}}
  </p>
</td></tr>

  <!-- 问候语：左右内边距改为 50px -->
  <tr><td style="padding:24px 50px 12px 50px;">
    <p style="margin:0;font-size:15px;color:#333333;line-height:1.8;">
      亲爱的读者，您好！
    </p>
    <p style="margin:8px 0 0 0;font-size:14px;color:#555555;line-height:1.8;">
      以下是过去一周 <strong>AI 智能体架构</strong>与<strong>半导体晶圆制造</strong>领域的重点动态核心摘要：
    </p>
  </td></tr>

  <!-- ✅ 正文标题模板 -->
  <tr><td style="padding:0 50px 16px 50px;">
    <table cellpadding="0" cellspacing="0" style="width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'PingFang SC', sans-serif;">
      <tr>
        <!-- 数字 01 -->
        <td style="vertical-align: middle; font-size: 38px; font-weight: 800; color: #3bdcee; line-height: 1; padding-right: 16px; letter-spacing: -2px; width: 1%; white-space: nowrap;">01</td>
        <!-- 文字 模型发布/更新 -->
        <td style="vertical-align: middle; font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1.2; text-align: left;">模型发布/更新</td>
      </tr>
    </table>
  </td></tr>

  <!-- 正文内容：左右内边距改为 50px -->
  <tr><td style="padding:16px 50px 24px 50px;">
    <div style="font-size:15px;color:#222222;line-height:1.8;">
{{content_html}}
    </div>
  </td></tr>

  <!-- 分隔线：左右内边距改为 50px -->
  <tr><td style="padding:0 50px;">
    <hr style="border:none;border-top:2px solid #e4f1fd; margin:0;">
  </td></tr>

  <!-- 页脚：左右内边距改为 50px -->
  <tr><td style="padding:20px 50px 32px 50px;">
    <p style="margin:0;font-size:13px;color:#8892a4;line-height:1.6;">
      祝您工作顺利，生活愉快！
    </p>
    <p style="margin:12px 0 0 0;font-size:11px;color:#b0b0b0;line-height:1.5;">
      ⚠️ 提示：本邮件内容由 AI 辅助创作，可能存在幻觉和错误，仅供参考。
    </p>
  </td></tr>

</table>
</td></tr>
</table>
</body>
</html>
